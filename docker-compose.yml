services:
  # ─── MongoDB ───
  mongodb:
    image: mongo:7
    container_name: alphabrain-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: alphabrain
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Spring Boot) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alphabrain-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/alphabrain
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_min_32_chars}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy

  # ─── Frontend (React + nginx) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""  # empty = relative, nginx proxies /api/ to backend
        VITE_APP_NAME: AlphaBrain
    container_name: alphabrain-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
    driver: local

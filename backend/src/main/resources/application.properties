# Server configuration
server.port=8081
spring.main.allow-circular-references=true
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# MongoDB configuration
spring.data.mongodb.uri=mongodb://localhost:27017/alphabrain
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connection-timeout=5000
spring.data.mongodb.socket-timeout=10000
spring.data.mongodb.retry-writes=true
# Continue on MongoDB errors
spring.data.mongodb.repositories.type=auto

# Fallback to embedded MongoDB if external is not available
spring.mongodb.embedded.version=5.0.5
spring.mongodb.embedded.storage.database-dir=./data/mongodb

# H2 Database for JPA entities
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA and Database Initialization Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# JWT configuration
jwt.secret=alphabrain_jwt_secret_key_that_is_at_least_32_chars_long_for_security
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,http://127.0.0.1:5176
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,X-XSRF-TOKEN
cors.allow-credentials=true

# Spring MVC CORS configuration (alternative approach)
spring.webmvc.cors.allowed-origins=http://localhost:5173
spring.webmvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.webmvc.cors.allowed-headers=*

# Logging for debugging
logging.level.com.alphabrain=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security.authentication=TRACE
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.springframework.data.mongodb.core=DEBUG
logging.level.org.mongodb=DEBUG

# Spring Actuator configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always 
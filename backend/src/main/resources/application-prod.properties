# ─── AlphaBrain Production Configuration ───
# All secrets come from environment variables — never hardcode them.

server.port=${PORT:8081}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://mongodb:27017/alphabrain}
spring.data.mongodb.auto-index-creation=true

# Disable JPA auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# JWT
jwt.secret=${JWT_SECRET:change_me_in_production_min_32_chars}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS — set to your actual frontend domain
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin
cors.allow-credentials=true

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.cache.ttl-minutes=60

# Logging — less verbose in production
logging.level.root=WARN
logging.level.com.alphabrain=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN

# Actuator — restrict in production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=WHEN_AUTHORIZED

spring.main.allow-circular-references=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: alphabrain-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=alphabrain
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local 